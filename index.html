<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历 × JD 匹配器</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a26;
    --border: #2a2a3e;
    --text: #e4e4ed;
    --text-secondary: #8888a8;
    --accent: #ff6b6b;
    --accent-glow: rgba(255,107,107,0.15);
    --success: #4ecdc4;
    --radius: 12px;
    --transition: 200ms ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

  header { text-align: center; padding: 40px 0 32px; }
  .logo { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { background: linear-gradient(135deg, var(--accent), #ff8e8e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-top: 6px; }

  .api-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 8px 8px 16px; margin-bottom: 24px;
  }
  .api-bar input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 0.875rem; outline: none; font-family: inherit; }
  .api-bar input::placeholder { color: var(--text-secondary); }
  .api-badge { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; padding-right: 4px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color var(--transition);
  }
  .card:focus-within { border-color: rgba(255,107,107,0.4); box-shadow: 0 0 0 3px var(--accent-glow); }

  .card-label {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 18px 0; font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary);
  }
  .card-label::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .card-label.jd::before { background: var(--success); }

  .card textarea {
    width: 100%; min-height: 240px; background: transparent; border: none;
    color: var(--text); font-size: 0.9rem; font-family: inherit;
    line-height: 1.7; padding: 12px 18px 18px; resize: vertical; outline: none;
  }
  .card textarea::placeholder { color: var(--text-secondary); opacity: 0.5; }

  .action-row { display: flex; justify-content: center; margin-bottom: 28px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 40px; font-size: 0.95rem; font-weight: 600;
    font-family: inherit; border: none; border-radius: 50px; cursor: pointer;
    transition: all var(--transition); background: var(--accent); color: #fff;
    position: relative; overflow: hidden;
  }
  .btn::after { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1)); pointer-events: none; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
  .btn:active { transform: translateY(0); box-shadow: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .btn.loading .spinner { display: inline-block; }
  .btn.loading .btn-text { display: none; }

  .output-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .output-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .output-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
  .copy-btn { font-size: 0.75rem; font-family: inherit; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all var(--transition); }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .output-body { padding: 20px 22px; font-size: 0.9rem; line-height: 1.8; white-space: pre-wrap; min-height: 120px; }
  .output-body:empty::after { content: "优化后的简历将在此显示..."; color: var(--text-secondary); opacity: 0.4; }

  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .output-body.loading-placeholder {
    background: linear-gradient(90deg, var(--surface) 25%, #222236 50%, var(--surface) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 6px;
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #2d1b1b; color: #ff8e8e; border: 1px solid rgba(255,107,107,0.3);
    padding: 12px 24px; border-radius: 8px; font-size: 0.85rem; z-index: 100;
    animation: slideDown 300ms ease, fadeOut 300ms ease 3s forwards;
    pointer-events: none;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Resume<span>×JD</span></div>
    <div class="subtitle">AI 驱动的简历-岗位匹配优化</div>
  </header>

  <div class="api-bar">
    <span class="api-badge">🔑 DS Key</span>
    <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key..." autocomplete="off">
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">📄 我的简历</div>
      <textarea id="resumeInput" placeholder="粘贴你的简历内容...

教育背景：XX大学 计算机科学 本科 2021-2025
实习经历：XX科技公司 后端开发实习生 2024.06-2024.09
项目经历：......"></textarea>
    </div>
    <div class="card">
      <div class="card-label jd">🎯 岗位 JD</div>
      <textarea id="jdInput" placeholder="粘贴目标岗位的职位描述...

岗位职责：
1. 负责后端服务开发与维护...
任职要求：
1. 熟悉Python，有Django开发经验..."></textarea>
    </div>
  </div>

  <div class="action-row">
    <button class="btn" id="submitBtn" onclick="optimize()">
      <span class="spinner"></span>
      <span class="btn-text">⚡ 开始匹配优化</span>
    </button>
  </div>

  <div class="output-card">
    <div class="output-header">
      <span class="output-title">✨ 优化结果</span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">复制</button>
    </div>
    <div class="output-body" id="outputBody"></div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `你是一个资深的简历优化专家。用户会提供：
1. 原始简历（包含教育背景、实习经历、项目经历、技能等）
2. 目标岗位的 JD（职位描述）

你的任务：将原始简历改写为匹配该 JD 的优化版简历。

## 优秀项目经历撰写规范（必须遵守）

### 1. 核心要素齐全
每个项目必须包含：项目名称 + 时间段 + 对应岗位 + 项目背景 + 痛点 + 技术架构 + 主要职责（STAR法则） + 项目成效（量化数据）。

### 2. 内容真实具体
结合用户实际经历补充细节，避免「参与开发」「负责优化」等空泛表述。

### 3. 数据支撑成效
凡有量化成果处，用具体数据体现：「完成 X 份文档」「指标从 A 提升至 B」「时长从 X 缩短至 Y」「覆盖率达 Z%」。

## 优秀项目示例（格式参照）

多模态 RAG 风电设备运维文档知识库系统
2025.08 - 2026.03 | 大模型应用开发工程师

项目背景：面向风电运维场景大量设备手册、故障图解等 PDF/PPT 图文资料分散、检索效率低的问题，搭建多模态 RAG 文档知识库系统。

技术架构：LangChain、LangGraph、Milvus、Dots.OCR、RAGAS、Qwen3-VL、vllm

主要职责：
- 使用 dots.OCR 解析 PDF/PPT 图文，私有化部署 gme-Qwen2-VL-7B 嵌入模型，实现 Any-to-Any 跨模态检索。
- 构建稠密+稀疏双向向量索引，加权融合+ BGE-Reranker 重排，提升召回质量。
- Redis 分层管理长短期上下文，异步持久化至向量库，设置 distance 阈值保证精度。
- 引入 RAGAS 框架评估 ContextPrecision/Recall 及 ResponseRelevancy/Faithfulness。

项目成效：
- 完成 1200+ 份设备手册结构化入库，覆盖 3 大机型、27 类核心部件
- 跨模态 Recall@5 从 62% 提升至 87%，问答准确率达 89%
- 故障定位平均时长从 42 分钟缩短至 11 分钟，自助解决率提升 68%

## 改写规则
1. 严禁编造：不虚构用户没有的技术栈、项目、数据。
2. 只做重排与润色：调整措辞、突出 JD 关键词、调顺序。
3. 模块化处理：自动识别各模块，分别针对 JD 匹配。
4. 关键词对齐：JD 关键词自然融入，仅在用户具备该能力时。
5. 格式对齐示例：项目经历参照上方示例结构组织。

## 输出格式
直接输出优化后的完整简历文本：
- 教育背景
- 实习经历
- 项目经历（每个项目按「名称 + 时间段 + 岗位 + 背景 + 技术架构 + 职责 + 成效」）
- 技能
末尾附「JD匹配度：XX%」。不输出任何解释或开场白。`;

async function optimize() {
  const apiKey = document.getElementById("apiKey").value.trim();
  const resume = document.getElementById("resumeInput").value.trim();
  const jd = document.getElementById("jdInput").value.trim();
  const btn = document.getElementById("submitBtn");
  const output = document.getElementById("outputBody");

  if (!apiKey) return toast("请先输入 DeepSeek API Key");
  if (!resume) return toast("请输入简历内容");
  if (!jd) return toast("请输入岗位 JD");

  btn.classList.add("loading");
  btn.disabled = true;
  output.classList.add("loading-placeholder");
  output.textContent = "";

  try {
    const resp = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: "## 原始简历\n\n" + resume + "\n\n## 目标岗位JD\n\n" + jd }
        ],
        temperature: 0.3,
        max_tokens: 4096
      })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || "API 请求失败: " + resp.status);
    const result = data.choices[0].message.content;

    output.classList.remove("loading-placeholder");
    output.textContent = result;
  } catch (e) {
    output.classList.remove("loading-placeholder");
    output.textContent = "";
    toast(e.message);
  } finally {
    btn.classList.remove("loading");
    btn.disabled = false;
  }
}

async function copyResult() {
  const text = document.getElementById("outputBody").textContent;
  if (!text) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById("copyBtn");
  btn.textContent = "已复制 ✓";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 1800);
}

function toast(msg) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

document.getElementById("jdInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && e.ctrlKey) optimize();
});
</script>
</body>
</html>
